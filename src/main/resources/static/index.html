<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chat Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <form action="/logout" method="post" class="logout-form" id="logoutForm">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
            <div class="token-bar-container">
                <div class="token-bar-label">Token</div>
                <div class="token-bar">
                    <div class="token-bar-fill" id="tokenBar"></div>
                </div>
                <div class="token-bar-pct" id="tokenPct">0%</div>
            </div>
            <button id="correctionShowBtn" class="correction-show-btn hidden">
                Corrections <span id="correctionBadge">0</span>
            </button>
            <button id="flashcardToggle" class="header-btn">闪卡</button>
        </header>

        <main>
            <div class="main-layout">
                <div id="chatArea" class="chat-area">
                    <div id="earlierMarker" class="earlier-marker hidden">
                        <button id="showEarlierBtn">Show earlier messages</button>
                    </div>
                    <div id="messages"></div>
                </div>
                <div id="correctionSidebar" class="correction-sidebar collapsed">
                    <div class="correction-sidebar-header">
                        <span>Corrections</span>
                        <button id="correctionSidebarToggle">&times;</button>
                    </div>
                    <div id="correctionSidebarContent" class="correction-sidebar-content">
                        <div class="correction-sidebar-empty">No corrections yet.</div>
                    </div>
                </div>
            </div>

            <div id="statusBar" class="status-bar">
                <span id="statusIndicator">Disconnected</span>
            </div>

            <div id="textInputBar" class="text-input-bar hidden">
                <input id="textInput" type="text" placeholder="Type or use 🎤 on keyboard..." autocomplete="off" enterkeyhint="send">
                <button id="sendTextBtn" class="btn btn-send">Send</button>
            </div>
        </main>

        <footer>
            <div class="controls">
                <select id="modeSelect">
                    <option value="WORKPLACE_STANDUP">Standup Meeting</option>
                    <option value="DAILY_TALK">Daily Talk</option>
                </select>
                <button id="startBtn" class="btn btn-primary">Start Session</button>
                <button id="endBtn" class="btn btn-danger" disabled>End &amp; Report</button>
            </div>
        </footer>
    </div>

    <div id="reportModal" class="modal hidden">
        <div class="modal-content">
            <h2>Session Report</h2>
            <div id="reportContent"></div>
            <div class="modal-actions">
                <button id="newSessionBtn" class="btn btn-primary">Start New Session</button>
                <button id="closeReportBtn" class="btn">Close</button>
            </div>
        </div>
    </div>

    <div id="flashcardPanel" class="flashcard-panel collapsed">
        <div class="flashcard-header">
            <span class="flashcard-title">闪卡</span>
            <button id="flashcardClose" class="flashcard-close">&times;</button>
        </div>
        <div id="flashcardStage1" class="flashcard-stage">
            <input id="flashcardFront" type="text" placeholder="单词或表达..." autocomplete="off">
            <button id="flashcardContinue" class="flashcard-btn">继续</button>
        </div>
        <div id="flashcardStage2" class="flashcard-stage hidden">
            <textarea id="flashcardBack" placeholder="释义或校正文..." rows="2"></textarea>
            <div id="flashcardTagArea">
                <div id="flashcardTagChips"></div>
                <input id="flashcardTagInput" type="text" placeholder="添加标签..." autocomplete="off">
                <div id="flashcardTagSuggestions" class="tag-suggestions hidden"></div>
            </div>
            <button id="flashcardSave" class="flashcard-btn primary">保存</button>
        </div>
    </div>

    <div id="flashcardToast" class="flashcard-toast hidden">已保存</div>

    <div id="debugPanel" class="debug-panel">
        <div class="debug-header">
            <button id="debugToggle">Log</button>
            <button id="debugClear">Clear</button>
        </div>
        <div id="debugLog" class="debug-log hidden"></div>
    </div>

    <template id="msgTemplate">
        <div class="message">
            <span class="role"></span>
            <span class="content"></span>
        </div>
    </template>

    <template id="correctionBubbleTemplate">
        <div class="message correction-bubble">
            <span class="role">Correction</span>
            <span class="content"></span>
        </div>
    </template>

    <template id="correctionSidebarItemTemplate">
        <div class="correction-item">
            <div class="correction-type"></div>
            <div class="correction-detail">
                <span class="correction-original"></span>
                <span class="correction-arrow">&rarr;</span>
                <span class="correction-corrected"></span>
            </div>
            <div class="correction-explanation"></div>
        </div>
    </template>

    <script src="app.js"></script>
    <script src="flashcard.js"></script>
</body>
</html>
