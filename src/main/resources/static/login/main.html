<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>English Coach - Login</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">English Coach</h1>
            <p class="login-subtitle">AI-powered spoken English practice</p>
            <div id="errorMsg" class="login-error hidden">Invalid username or password</div>
            <form id="loginForm" action="/login" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" autocomplete="username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="rememberMe" name="remember-me">
                    <label for="rememberMe">Remember me (14 days)</label>
                </div>
                <button type="submit" class="btn-login">Log in</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
