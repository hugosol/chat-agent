server:
  port: 8080
  forward-headers-strategy: native
  servlet:
    session:
      cookie:
        secure: true

spring:
  h2:
    console:
      enabled: false
  datasource:
    url: jdbc:h2:file:./data/englishcoach;DB_CLOSE_DELAY=-1
    username: sa
    password: chatagent-db

langchain4j:
  openai:
    chat-model:
      api-key: ${DEEPSEEK_API_KEY}

app:
  tmdb:
    api-key: ${TMDB_API_KEY}
  subdl:
    api-key: ${SUBDL_API_KEY}
  initial-users:
    - username: admin
      password: ${INITIAL_USER_PASSWORD}
