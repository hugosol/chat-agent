server:
  port: 8080
  error:
    include-message: always
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:h2:file:./data/englishcoach;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

langchain4j:
  openai:
    chat-model:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:sk-****}
      model-name: ${DEEPSEEK_MODEL:deepseek-v4-flash}
      temperature: 0.7
      max-tokens: 2048
      timeout: 30s
      log-requests: true
      log-responses: false

app:
  token-limit: 128000
  token-limit-ratio: 0.8
  prompt-directory: classpath:prompts
  memory:
    store-path: data/embedding-store.json
    retrieval:
      top-k: 2
      similarity-threshold: 0.6
  security:
    permit-all-paths:
      - /login/**
      - /shared/*.css
      - /shared/react.production.min.js
      - /shared/react-dom.production.min.js
  proxy:
    enabled: false
    host:
    port: 0
  wiktionary:
    base-url: https://en.wiktionary.org
    connect-timeout: 5s
    max-retries: 2
  tmdb:
    base-url: https://api.themoviedb.org
    connect-timeout: 10s
    api-key: ${TMDB_API_KEY:****}
  subdl:
    api-key: ${SUBDL_API_KEY:subdl_****}
  llm:
    max-output-tokens:
      default: 2048
      report: 4096
