server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/englishcoach;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

langchain4j:
  openai:
    chat-model:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:sk-****}
      model-name: ${DEEPSEEK_MODEL:deepseek-v4-flash}
      temperature: 0.7
      max-tokens: 2048
      timeout: 30s
      log-requests: true
      log-responses: false

app:
  token-limit-ratio: 0.8
  prompt-directory: classpath:prompts
