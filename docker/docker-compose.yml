services:
  chat-agent:
    image: ghcr.io/hugosol/chat-agent:latest
    container_name: chat-agent
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - /你的宿主机数据路径:/app/data
    environment:
      - SPRING_PROFILES_ACTIVE=prd
      - DEEPSEEK_API_KEY=请替换为你的DeepSeek密钥
      - INITIAL_USER_PASSWORD=请设置初始登录密码
    restart: unless-stopped
